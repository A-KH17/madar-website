<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="250" fill="#f9f9f7"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="360" height="50" rx="8" fill="#001e40"/>
  <text x="40" y="40" fill="white" font-size="13" font-weight="bold" font-family="Manrope, sans-serif">Cash Forecast (30 Days)</text>
  <text x="40" y="58" fill="#fed488" font-size="10" font-family="Manrope, sans-serif">4 weeks ahead</text>
  
  <-- Status indicator -->
  <rect x="310" y="32" width="55" height="26" rx="4" fill="#e8f5e9"/>
  <circle cx="325" cy="45" r="5" fill="#4caf50"/>
  <text x="345" y="49" fill="#2e7d32" font-size="9" font-family="Manrope, sans-serif">Safe</text>
  
  <!-- Chart Area -->
  <rect x="20" y="85" width="360" height="145" rx="6" fill="white" stroke="#e8e8e6" stroke-width="1"/>
  
  <!-- Y-axis labels -->
  <text x="35" y="110" fill="#775a19" font-size="9" font-family="Manrope, sans-serif">+2M</text>
  <text x="35" y="145" fill="#775a19" font-size="9" font-family="Manrope, sans-serif">+1M</text>
  <text x="35" y="180" fill="#775a19" font-size="9" font-family="Manrope, sans-serif">0</text>
  
  <!-- Grid lines -->
  <line x1="60" y1="105" x2="370" y2="105" stroke="#f4f4f2" stroke-width="1"/>
  <line x1="60" y1="140" x2="370" y2="140" stroke="#f4f4f2" stroke-width="1"/>
  <line x1="60" y1="175" x2="370" y2="175" stroke="#f4f4f2" stroke-width="1"/>
  
  <!-- Area fill -->
  <polygon points="60,140 137,120 215,135 292,110 370,125 370,210 60,210" fill="#001e40" opacity="0.1"/>
  
  <!-- Line chart -->
  <polyline points="60,140 137,120 215,135 292,110 370,125" fill="none" stroke="#001e40" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Data points -->
  <circle cx="60" cy="140" r="6" fill="#001e40"/>
  <circle cx="137" cy="120" r="6" fill="#001e40"/>
  <circle cx="215" cy="135" r="6" fill="#775a19"/>
  <circle cx="292" cy="110" r="6" fill="#001e40"/>
  <circle cx="370" cy="125" r="6" fill="#001e40"/>
  
  <!-- Week labels -->
  <text x="60" y="225" fill="#1a1c1b" font-size="10" font-family="Manrope, sans-serif" text-anchor="middle">Week 1</text>
  <text x="137" y="225" fill="#1a1c1b" font-size="10" font-family="Manrope, sans-serif" text-anchor="middle">Week 2</text>
  <text x="215" y="225" fill="#1a1c1b" font-size="10" font-family="Manrope, sans-serif" text-anchor="middle">Week 3</text>
  <text x="292" y="225" fill="#1a1c1b" font-size="10" font-family="Manrope, sans-serif" text-anchor="middle">Week 4</text>
  <text x="370" y="225" fill="#1a1c1b" font-size="10" font-family="Manrope, sans-serif" text-anchor="middle">Week 5</text>
  
  <!-- Value tooltips -->
  <rect x="50" y="95" width="40" height="18" rx="3" fill="#001e40"/>
  <text x="70" y="107" fill="white" font-size="9" font-family="Manrope, sans-serif" text-anchor="middle">+1.2M</text>
  
  <rect x="272" y="85" width="40" height="18" rx="3" fill="#775a19"/>
  <text x="292" y="97" fill="white" font-size="9" font-family="Manrope, sans-serif" text-anchor="middle">+1.8M</text>
</svg>
