<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="250" fill="#f9f9f7"/>
  
  <!-- Calendar Header -->
  <rect x="20" y="20" width="360" height="50" rx="8" fill="#001e40"/>
  <text x="40" y="40" fill="white" font-size="13" font-weight="bold" font-family="Tajawal, sans-serif">الالتزامات القادمة</text>
  <text x="40" y="58" fill="#fed488" font-size="10" font-family="Tajawal, sans-serif">٥ مدفوعات | ٣٨٠K ر.س</text>
  <text x="360" y="50" fill="white" font-size="20" font-weight="bold" font-family="Tajawal, sans-serif" text-anchor="end">٣٨٠K</text>
  
  <!-- Calendar Grid -->
  <rect x="20" y="85" width="360" height="145" rx="6" fill="white" stroke="#e8e8e6" stroke-width="1"/>
  
  <!-- Week headers -->
  <text x="45" y="105" fill="#775a19" font-size="9" font-weight="600" font-family="Tajawal, sans-serif" text-anchor="middle">أحد</text>
  <text x="95" y="105" fill="#775a19" font-size="9" font-weight="600" font-family="Tajawal, sans-serif" text-anchor="middle">اثنين</text>
  <text x="145" y="105" fill="#775a19" font-size="9" font-weight="600" font-family="Tajawal, sans-serif" text-anchor="middle">ثلاثاء</text>
  <text x="195" y="105" fill="#775a19" font-size="9" font-weight="600" font-family="Tajawal, sans-serif" text-anchor="middle">أربعاء</text>
  <text x="245" y="105" fill="#775a19" font-size="9" font-weight="600" font-family="Tajawal, sans-serif" text-anchor="middle">خميس</text>
  
  <!-- Row 1 -->
  <rect x="35" y="120" width="40" height="45" rx="4" fill="#f4f4f2"/>
  <text x="55" y="140" fill="#1a1c1b" font-size="11" font-family="Tajawal, sans-serif" text-anchor="middle">٢٤</text>
  
  <rect x="85" y="120" width="40" height="45" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
  <text x="105" y="138" fill="#c62828" font-size="10" font-weight="bold" font-family="Tajawal, sans-serif" text-anchor="middle">٢٥</text>
  <text x="105" y="155" fill="#c62828" font-size="8" font-family="Tajawal, sans-serif" text-anchor="middle">رواتب</text>
  
  <rect x="135" y="120" width="40" height="45" rx="4" fill="#f4f4f2"/>
  <text x="155" y="140" fill="#1a1c1b" font-size="11" font-family="Tajawal, sans-serif" text-anchor="middle">٢٦</text>
  
  <rect x="185" y="120" width="40" height="45" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="205" y="138" fill="#ef6c00" font-size="10" font-weight="bold" font-family="Tajawal, sans-serif" text-anchor="middle">٢٧</text>
  <text x="205" y="155" fill="#ef6c00" font-size="8" font-family="Tajawal, sans-serif" text-anchor="middle">إيجار</text>
  
  <rect x="235" y="120" width="40" height="45" rx="4" fill="#f4f4f2"/>
  <text x="255" y="140" fill="#1a1c1b" font-size="11" font-family="Tajawal, sans-serif" text-anchor="middle">٢٨</text>
  
  <!-- Row 2 -->
  <rect x="35" y="175" width="40" height="45" rx="4" fill="#f4f4f2"/>
  <text x="55" y="195" fill="#1a1c1b" font-size="11" font-family="Tajawal, sans-serif" text-anchor="middle">٣١</text>
  
  <rect x="85" y="175" width="40" height="45" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="105" y="193" fill="#1565c0" font-size="10" font-weight="bold" font-family="Tajawal, sans-serif" text-anchor="middle">١</text>
  <text x="105" y="210" fill="#1565c0" font-size="8" font-family="Tajawal, sans-serif" text-anchor="middle">GOSI</text>
  
  <rect x="135" y="175" width="40" height="45" rx="4" fill="#f4f4f2"/>
  <text x="155" y="195" fill="#1a1c1b" font-size="11" font-family="Tajawal, sans-serif" text-anchor="middle">٢</text>
  
  <rect x="185" y="175" width="40" height="45" rx="4" fill="#f4f4f2"/>
  <text x="205" y="195" fill="#1a1c1b" font-size="11" font-family="Tajawal, sans-serif" text-anchor="middle">٣</text>
  
  <rect x="235" y="175" width="40" height="45" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="255" y="193" fill="#ef6c00" font-size="10" font-weight="bold" font-family="Tajawal, sans-serif" text-anchor="middle">٤</text>
  <text x="255" y="210" fill="#ef6c00" font-size="8" font-family="Tajawal, sans-serif" text-anchor="middle">VAT</text>
  
  <!-- Amount labels -->
  <text x="300" y="135" fill="#c62828" font-size="10" font-weight="600" font-family="Tajawal, sans-serif">١٥٠K ر.س</text>
  <text x="300" y="190" fill="#ef6c00" font-size="10" font-weight="600" font-family="Tajawal, sans-serif">٨٠K ر.س</text>
</svg>
