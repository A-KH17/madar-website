  <text x="350" y="47" fill="#001e40" font-size="12" font-weight="bold" font-family="Manrope, sans-serif" text-anchor="middle">4</text>
  
  <!-- Priority Items -->
  <!-- Item 1 - High Priority -->
  <rect x="20" y="80" width="360" height="55" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
  <circle cx="45" cy="107" r="12" fill="#f44336"/>
  <text x="45" y="112" fill="white" font-size="10" font-weight="bold" font-family="Manrope, sans-serif" text-anchor="middle">1</text>
  
  <text x="70" y="100" fill="#001e40" font-size="12" font-weight="600" font-family="Manrope, sans-serif">ArchiDev Development Est.</text>
