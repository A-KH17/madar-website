  <text x="45" y="170" fill="white" font-size="10" font-weight="bold" font-family="Manrope, sans-serif" text-anchor="middle">2</text>
  
  <text x="70" y="162" fill="#001e40" font-size="12" font-weight="600" font-family="Manrope, sans-serif">Modern Construction Co.</text>
  <text x="280" y="162" fill="#775a19" font-size="11" font-family="Manrope, sans-serif">60 days | 120K</text>
  
  <!-- Item 3 -->
