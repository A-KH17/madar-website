  <text x="45" y="220" fill="white" font-size="10" font-weight="bold" font-family="Manrope, sans-serif" text-anchor="middle">3</text>
  
  <text x="70" y="212" fill="#001e40" font-size="12" font-weight="600" font-family="Manrope, sans-serif">Al-Imdad Trading Est.</text>
